name: CI

# Red tests block a merge; deploy.yml still only fires on main. The push
# trigger covers direct-to-main commits, which this repo allows.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Lint rides inside the `test` job on purpose — the main-branch ruleset
      # requires a check with exactly this job's name.
      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
